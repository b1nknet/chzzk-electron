<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chzzk Widget</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="titlebar">
      <span id="app-title">치지직 위젯</span>
      <div id="titlebar-btns">
        <span id="countdown" title="다음 새로고침까지">30s</span>
        <button id="pin-btn" title="항상 위에 고정">📌</button>
        <button id="refresh-btn" title="새로고침">↺</button>
        <button id="add-btn" title="채널 추가">+</button>
        <button id="minimize-btn">−</button>
        <button id="close-btn">×</button>
      </div>
    </div>

    <div id="channel-list"></div>

    <div id="footer">
      <span id="opacity-label">투명도</span>
      <input id="opacity-slider" type="range" min="20" max="100" value="100" />
      <span id="opacity-value">100%</span>
    </div>

    <div id="add-modal" class="hidden">
      <div id="add-modal-inner">
        <p>채널 ID 또는 chzzk.naver.com URL 입력</p>
        <input id="channel-input" type="text" placeholder="예: abcd1234 또는 전체 URL" />
        <div id="add-modal-btns">
          <button id="add-confirm-btn">추가</button>
          <button id="add-cancel-btn">취소</button>
        </div>
        <p id="add-error" class="hidden"></p>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
